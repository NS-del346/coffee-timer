<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Coffee Timer"/>
  <meta name="theme-color" content="#080d1a"/>
  <title>Coffee Timer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#080d1a;}
    body{
      font-family:-apple-system,'Hiragino Mincho ProN','Georgia',serif;
      color:#e8e0d0;
      overscroll-behavior:none;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
    }
    #root{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}

    /* Tab bar height + safe area */
    :root{
      --tab-h:49px;
      --safe-b:env(safe-area-inset-bottom,0px);
      --safe-t:env(safe-area-inset-top,0px);
      --content-pb:calc(var(--tab-h) + var(--safe-b) + 16px);
    }

    @keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes steam1{0%,100%{transform:translateY(0) scaleX(1);opacity:.5;}50%{transform:translateY(-10px) scaleX(1.2);opacity:.2;}}
    @keyframes steam2{0%,100%{transform:translateY(0) scaleX(1);opacity:.4;}50%{transform:translateY(-12px) scaleX(.9);opacity:.15;}}
    @keyframes steam3{0%,100%{transform:translateY(0) scaleX(1);opacity:.5;}50%{transform:translateY(-8px) scaleX(1.3);opacity:.2;}}

    .slide-up{animation:slideUp .28s cubic-bezier(.4,0,.2,1) forwards;}
    .fade-in{animation:fadeIn .2s ease forwards;}
    .press:active{transform:scale(.97);transition:transform .1s;}

    /* Scrollable content area */
    .scroll-area{
      flex:1;overflow-y:auto;
      padding-top:var(--safe-t);
      padding-bottom:var(--content-pb);
      -webkit-overflow-scrolling:touch;
      min-height:0;
    }

    /* Tab bar */
    .tab-bar{
      position:fixed;bottom:0;left:0;right:0;
      height:calc(var(--tab-h) + var(--safe-b));
      background:rgba(8,13,26,.96);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:0.5px solid rgba(255,255,255,.12);
      display:flex;align-items:flex-start;
      padding-bottom:var(--safe-b);
      z-index:100;
    }
    .tab-item{
      flex:1;height:var(--tab-h);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;border:none;background:none;cursor:pointer;
      min-width:44px;padding:0 4px;
      -webkit-tap-highlight-color:transparent;
      transition:opacity .15s;
    }
    .tab-item:active{opacity:.7;}
    .tab-label{font-size:10px;letter-spacing:.02em;font-family:-apple-system,sans-serif;}

    /* Sticky CTA */
    .brew-cta{
      position:sticky;bottom:0;left:0;right:0;
      padding:12px 16px 16px;
      background:#080d1a;
      z-index:10;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
const C = {
  bg:       '#080d1a',
  card:     'rgba(255,255,255,.045)',
  border:   'rgba(255,255,255,.09)',
  gold:     '#D4AF37',
  goldHi:   '#F0CF6A',
  goldDim:  'rgba(212,175,55,.22)',
  goldBg:   'rgba(212,175,55,.09)',
  blue:     '#3a9fc0',
  white:    '#F2EAD8',
  dim:      '#8A9EAE',
  dimmer:   '#4A5F70',
  danger:   '#e87a5a',
};
const SP = {xs:8,sm:12,md:16,lg:24,xl:32};

/* ═══════════════════════════════════════════
   SF-SYMBOL-STYLE SVG ICONS
═══════════════════════════════════════════ */
function IconHome({color,size=24}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
  );
}
function IconDripper({color,size=24}){
  /* V60 dripper + server — minimal line art */
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      {/* Dripper cone */}
      <path d="M6 3h12l-4 8H10L6 3z"/>
      {/* Drip */}
      <line x1="12" y1="11" x2="12" y2="14"/>
      {/* Server body */}
      <path d="M8 14h8v4a2 2 0 01-2 2h-4a2 2 0 01-2-2v-4z"/>
      {/* Server handle */}
      <path d="M16 16h2a1 1 0 000-2h-2"/>
    </svg>
  );
}
function IconFlask({color,size=24}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M9 3h6M9 3v6L5 18a1 1 0 00.9 1.5h12.2A1 1 0 0019 18l-4-9V3"/>
      <line x1="6.5" y1="14" x2="17.5" y2="14"/>
    </svg>
  );
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

/* ═══════════════════════════════════════════
   RECIPE DATA
═══════════════════════════════════════════ */
const KASUYA_STEPS = [
  {id:1, time:'0:00',seconds:0,  pour:30,cumulative:30, note:'蒸らし'},
  {id:2, time:'0:30',seconds:30, pour:30,cumulative:60, note:'15秒間隔で注湯'},
  {id:3, time:'0:45',seconds:45, pour:30,cumulative:90, note:''},
  {id:4, time:'1:00',seconds:60, pour:30,cumulative:120,note:''},
  {id:5, time:'1:15',seconds:75, pour:30,cumulative:150,note:''},
  {id:6, time:'1:30',seconds:90, pour:30,cumulative:180,note:''},
  {id:7, time:'1:45',seconds:105,pour:30,cumulative:210,note:''},
  {id:8, time:'2:00',seconds:120,pour:30,cumulative:240,note:'お湯が抜けにくくなる'},
  {id:9, time:'2:15',seconds:135,pour:30,cumulative:270,note:''},
  {id:10,time:'2:30',seconds:150,pour:30,cumulative:300,note:'注ぎきる'},
];
const KASUYA_FINISH = 210;

const BEAN_OPTIONS = [12,18,24,30,36,48];
const FLAVOR_OPT = [
  {id:'bright', label:'酸味・明るい', en:'BRIGHT',  sub:'1st少なめ'},
  {id:'balance',label:'バランス',     en:'BALANCE', sub:'均等'},
  {id:'sweet',  label:'甘み・クリア', en:'SWEET',   sub:'1st多め'},
];
const STRENGTH_OPT = [
  {id:'strong',label:'濃い', en:'STRONG',sub:'2投'},
  {id:'medium',label:'普通', en:'MEDIUM',sub:'3投'},
  {id:'light', label:'薄い', en:'LIGHT', sub:'4投'},
];

function calcRecipe(beans,flavor,strength){
  const total=beans*15,f40=Math.round(total*.4),s60=Math.round(total*.6);
  const r=flavor==='sweet'?.6:flavor==='bright'?.4:.5;
  const p1=Math.round(f40*r),p2=f40-p1;
  const n=strength==='strong'?2:strength==='light'?4:3;
  const pp=Math.round(s60/n);
  const steps=[
    {id:1,time:'0:00',seconds:0, pour:p1,cumulative:p1,   phase:'FLAVOR',note:'甘み・酸味調整 前半'},
    {id:2,time:'0:45',seconds:45,pour:p2,cumulative:p1+p2,phase:'FLAVOR',note:'甘み・酸味調整 後半'},
  ];
  let cum=p1+p2;
  for(let i=0;i<n;i++){
    const sec=90+i*45;
    const ap=i===n-1?total-cum:pp; cum+=ap;
    steps.push({
      id:3+i,
      time:`${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`,
      seconds:sec,pour:ap,cumulative:cum,phase:'STRENGTH',
      note:i===0?'濃度調整 開始':'',
    });
  }
  return {total,steps,finish:steps[steps.length-1].seconds+90};
}

/* ═══════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════ */

/* Big timer */
function TimerDisplay({elapsed,done}){
  return (
    <div style={{textAlign:'center',lineHeight:1}}>
      <div style={{
        fontSize:'clamp(88px,24vw,128px)',fontWeight:100,
        color:done?C.gold:C.white,
        letterSpacing:'-0.03em',fontVariantNumeric:'tabular-nums',
        transition:'color .4s',
      }}>{fmt(elapsed)}</div>
    </div>
  );
}

/* Thin progress bar */
function TimeBar({elapsed,total}){
  return (
    <div style={{height:2,background:'rgba(255,255,255,.07)',borderRadius:1,overflow:'hidden'}}>
      <div style={{
        height:'100%',width:`${Math.min(elapsed/total,1)*100}%`,
        background:`linear-gradient(90deg,${C.gold},${C.goldHi})`,
        borderRadius:1,transition:'width .5s linear',
      }}/>
    </div>
  );
}

/* Next pour card */
function NextPourCard({timeToNext,nextStep}){
  const urgent = timeToNext <= 5;
  return (
    <div style={{
      background:urgent?C.goldBg:C.card,
      border:`1px solid ${urgent?C.gold:C.border}`,
      borderRadius:16,padding:'16px 20px',textAlign:'center',
      transition:'all .3s',
    }}>
      <div style={{fontSize:10,color:C.dimmer,letterSpacing:'.2em',textTransform:'uppercase',marginBottom:6}}>
        次の注湯まで
      </div>
      <div style={{
        fontSize:'clamp(56px,15vw,88px)',fontWeight:100,
        color:urgent?C.goldHi:C.white,
        lineHeight:1,fontVariantNumeric:'tabular-nums',
        transition:'color .3s',
      }}>
        {timeToNext}<span style={{fontSize:'clamp(22px,5vw,32px)',color:C.dim,marginLeft:4}}>秒</span>
      </div>
      <div style={{fontSize:12,color:urgent?C.gold:C.dimmer,marginTop:8}}>
        {nextStep.time} · +{nextStep.pour}g · 累計 {nextStep.cumulative}g
      </div>
    </div>
  );
}

/* Pour progress */
function PourProgress({poured,total}){
  const pct=Math.round(poured/total*100);
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
        <div style={{fontSize:10,color:C.dimmer,letterSpacing:'.2em',textTransform:'uppercase'}}>注湯量（累計）</div>
        <div style={{fontSize:10,color:C.dimmer}}>{pct}%</div>
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:8}}>
        <span style={{
          fontSize:'clamp(44px,12vw,64px)',fontWeight:100,
          color:C.gold,lineHeight:1,fontVariantNumeric:'tabular-nums',
        }}>{poured}</span>
        <span style={{fontSize:'clamp(18px,4vw,24px)',color:C.dim}}>/ {total}g</span>
      </div>
      <div style={{height:5,background:'rgba(255,255,255,.06)',borderRadius:3,overflow:'hidden'}}>
        <div style={{
          height:'100%',width:`${poured/total*100}%`,
          background:`linear-gradient(90deg,#1a6080,#5ab8d8)`,
          borderRadius:3,transition:'width .4s ease',
        }}/>
      </div>
    </div>
  );
}

/* Step accordion */
function StepAccordion({steps,curIdx,phaseOf}){
  const [open,setOpen]=useState(false);
  const doneCount = curIdx+1;
  const total = steps.length;

  return (
    <div style={{borderRadius:14,overflow:'hidden',border:`1px solid ${C.border}`}}>
      <button
        onClick={()=>setOpen(o=>!o)}
        style={{
          width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'12px 16px',background:C.card,border:'none',cursor:'pointer',fontFamily:'inherit',
          minHeight:44,
        }}
        aria-expanded={open}
      >
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:12,color:C.dim,letterSpacing:'.1em'}}>ステップ一覧</span>
          <span style={{
            fontSize:10,padding:'2px 8px',borderRadius:20,
            background:C.goldBg,color:C.gold,
          }}>{doneCount} / {total}</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={C.dimmer} strokeWidth="1.5"
          style={{transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>
          <path d="M3 6l5 5 5-5"/>
        </svg>
      </button>

      {open && (
        <div className="slide-up" style={{background:'rgba(8,13,26,.6)'}}>
          {steps.map((step,i)=>{
            const status = i<curIdx?'done':i===curIdx?'active':i===curIdx+1?'next':'pending';
            const icon = status==='done'?'✓':status==='active'?'▶':status==='next'?'◦':'○';
            const phase = phaseOf(i);
            const isActive = status==='active';
            return (
              <div key={step.id} style={{
                display:'flex',alignItems:'center',gap:8,
                padding:'10px 16px',
                background:isActive?C.goldBg:'transparent',
                borderTop:`1px solid ${C.border}`,
                opacity:status==='done'?.45:1,
                transition:'background .3s',
              }}>
                {/* Status icon */}
                <div style={{
                  width:26,height:26,borderRadius:'50%',flexShrink:0,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:10,fontWeight:700,
                  background:isActive?C.gold:status==='done'?C.goldBg:'rgba(255,255,255,.06)',
                  color:isActive?C.bg:status==='done'?C.gold:C.dimmer,
                }}>{icon}</div>
                {/* Phase tag */}
                <span style={{
                  fontSize:8,padding:'2px 5px',borderRadius:4,flexShrink:0,
                  background:phase==='FLAVOR'?C.goldBg:'rgba(58,159,192,.1)',
                  color:phase==='FLAVOR'?C.gold:C.blue,letterSpacing:'.05em',
                }}>{phase}</span>
                {/* Time */}
                <span style={{width:34,fontSize:12,color:isActive?C.gold:C.dim,fontVariantNumeric:'tabular-nums',flexShrink:0}}>{step.time}</span>
                {/* Pour */}
                <span style={{width:30,fontSize:12,color:isActive?C.goldHi:C.dimmer,textAlign:'right',flexShrink:0}}>+{step.pour}g</span>
                {/* Cumulative */}
                <span style={{width:44,fontSize:12,color:isActive?C.white:C.dimmer,textAlign:'right',flexShrink:0}}>{step.cumulative}g</span>
                {/* Note */}
                {step.note&&isActive&&(
                  <span style={{fontSize:10,color:C.gold,lineHeight:1.4,flex:1}}>{step.note}</span>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* Large CTA button */
function BrewButton({label,onClick,variant,disabled}){
  const isPause=variant==='pause';
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className="press"
      aria-label={label}
      style={{
        width:'100%',height:56,borderRadius:14,
        border:isPause?`1px solid rgba(255,255,255,.15)`:'none',
        background:disabled?'rgba(255,255,255,.05)':isPause?'rgba(255,255,255,.07)':`linear-gradient(135deg,${C.gold},#A88C28)`,
        color:disabled?C.dimmer:C.white,
        fontSize:16,letterSpacing:'.1em',fontFamily:'inherit',fontWeight:300,
        cursor:disabled?'not-allowed':'pointer',
        boxShadow:(!disabled&&!isPause)?`0 4px 24px rgba(212,175,55,.28)`:'none',
        transition:'all .2s',
      }}
    >{label}</button>
  );
}

/* Completion banner */
function DoneBanner({message}){
  return (
    <div className="slide-up" style={{
      background:C.goldBg,border:`1px solid ${C.gold}`,
      borderRadius:16,padding:'16px 20px',textAlign:'center',marginBottom:SP.md,
    }}>
      <div style={{fontSize:24,marginBottom:6}}>☕</div>
      <div style={{fontSize:14,color:C.gold,letterSpacing:'.06em'}}>{message}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   KASUYA SCREEN
═══════════════════════════════════════════ */
function KasuyaScreen(){
  const [brewMode,setBrewMode]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setElapsed(p=>{
          if(p>=KASUYA_FINISH){clearInterval(ref.current);setRunning(false);setDone(true);return KASUYA_FINISH;}
          return p+1;
        });
      },1000);
    } else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running]);

  const curIdx=KASUYA_STEPS.reduce((a,s,i)=>elapsed>=s.seconds?i:a,-1);
  const nextStep=KASUYA_STEPS[curIdx+1];
  const timeToNext=nextStep?nextStep.seconds-elapsed:null;
  const poured=curIdx>=0?KASUYA_STEPS[curIdx].cumulative:0;
  const reset=()=>{clearInterval(ref.current);setElapsed(0);setRunning(false);setDone(false);};
  const phaseOf=i=>i<2?'FLAVOR':'STRENGTH';

  /* ── Recipe view ── */
  if(!brewMode){
    return (
      <div style={{padding:`${SP.md}px ${SP.md}px 0`,maxWidth:560,margin:'0 auto'}}>
        <div style={{
          background:`linear-gradient(150deg,${C.goldBg},rgba(8,13,26,0))`,
          border:`1px solid ${C.goldDim}`,borderRadius:20,
          padding:'24px 20px',marginBottom:SP.md,textAlign:'center',
        }}>
          <div style={{fontSize:10,color:C.gold,letterSpacing:'.3em',textTransform:'uppercase',marginBottom:6}}>
            Barista Tetsu Kasuya · World Champion
          </div>
          <h2 style={{fontSize:'clamp(24px,7vw,40px)',fontWeight:200,color:C.white,letterSpacing:'.03em',marginBottom:4}}>
            10投式の新レシピ
          </h2>
          <p style={{fontSize:12,color:C.dim,lineHeight:1.8}}>浅煎りの透明感とポテンシャルを最大限に引き出す</p>
        </div>

        {/* Spec grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:SP.xs,marginBottom:SP.md}}>
          {[['豆の量','20g'],['湯量','300g (1:15)'],['湯温','95〜96℃'],['挽き目','C40 / 40〜45'],['ドリッパー','HARIO V60 NEO'],['抽出時間','約3:30']].map(([l,v])=>(
            <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 14px'}}>
              <div style={{fontSize:10,color:C.dimmer,letterSpacing:'.08em',marginBottom:3}}>{l}</div>
              <div style={{fontSize:14,color:C.gold,fontWeight:500}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Theory */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px 16px',marginBottom:SP.md}}>
          <div style={{fontSize:10,color:C.dimmer,letterSpacing:'.2em',textTransform:'uppercase',marginBottom:8}}>抽出理論</div>
          <p style={{fontSize:12,color:C.dim,lineHeight:1.9}}>
            300gのお湯を30gずつ10回に分けて注ぎます。お湯をドリッパー内に溜めずスッと落とし切るイメージで。
            V60 Neoは少量ずつ均一にリブへ向かって抽出されるため、このレシピとの相性が特に抜群です。
          </p>
        </div>

        {/* Step list (collapsed by default) */}
        <div style={{marginBottom:SP.md}}>
          <StepAccordion steps={KASUYA_STEPS} curIdx={-1} phaseOf={phaseOf}/>
        </div>

        {/* Sticky CTA */}
        <div className="brew-cta" style={{margin:`0 -${SP.md}px`}}>
          <BrewButton label="▶  抽出を開始する" onClick={()=>setBrewMode(true)}/>
        </div>
      </div>
    );
  }

  /* ── Brew mode ── */
  const urgent=timeToNext!==null&&timeToNext<=5;
  const stepLabel=curIdx>=0?`STEP ${curIdx+1} / 10`:'READY';

  return (
    <div style={{padding:`${SP.md}px ${SP.md}px 0`,maxWidth:560,margin:'0 auto'}}>
      {/* Top strip */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:SP.sm}}>
        <div style={{fontSize:11,color:C.dimmer,letterSpacing:'.15em'}}>{stepLabel}</div>
        <button onClick={()=>{reset();setBrewMode(false);}} style={{
          background:'none',border:`1px solid ${C.border}`,borderRadius:8,
          padding:'5px 12px',color:C.dimmer,fontSize:11,cursor:'pointer',fontFamily:'inherit',minHeight:32,
        }}>レシピへ</button>
      </div>

      {/* Time bar */}
      <TimeBar elapsed={elapsed} total={KASUYA_FINISH}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:C.dimmer,marginTop:3,marginBottom:SP.md}}>
        <span>0:00</span><span>3:30</span>
      </div>

      {/* ①  Timer — largest */}
      <TimerDisplay elapsed={elapsed} done={done}/>
      <div style={{textAlign:'center',fontSize:11,color:C.dimmer,marginTop:4,marginBottom:SP.sm,letterSpacing:'.08em'}}>
        目安 3:30 完成
      </div>

      <div style={{height:1,background:C.border,marginBottom:SP.md}}/>

      {/* ② Next pour */}
      {timeToNext!==null&&running&&!done&&(
        <div style={{marginBottom:SP.md}}>
          <NextPourCard timeToNext={timeToNext} nextStep={nextStep}/>
        </div>
      )}

      {/* ③ Current step badge */}
      {curIdx>=0&&!done&&(
        <div style={{
          display:'inline-flex',alignItems:'center',gap:8,
          background:C.goldBg,border:`1px solid ${C.goldDim}`,
          borderRadius:20,padding:'4px 12px',marginBottom:SP.md,
        }}>
          <span style={{width:18,height:18,borderRadius:'50%',background:C.gold,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:C.bg,fontWeight:700}}>▶</span>
          <span style={{fontSize:11,color:C.gold}}>STEP {curIdx+1} · {KASUYA_STEPS[curIdx].time} · +{KASUYA_STEPS[curIdx].pour}g</span>
        </div>
      )}

      {/* ④ Pour progress */}
      <div style={{marginBottom:SP.md}}>
        <PourProgress poured={poured} total={300}/>
      </div>

      {done&&<DoneBanner message="完成！浅煎りのクリアさ・甘さ・香りをお楽しみください"/>}

      {/* Buttons */}
      <div style={{display:'flex',gap:SP.xs,marginBottom:SP.sm}}>
        <div style={{flex:1}}>
          <BrewButton
            label={running?'⏸  一時停止':'▶  スタート'}
            onClick={()=>setRunning(r=>!r)}
            variant={running?'pause':'start'}
            disabled={done}
          />
        </div>
        <button onClick={reset} style={{
          width:56,height:56,borderRadius:14,
          background:C.card,border:`1px solid ${C.border}`,
          color:C.dim,fontSize:12,cursor:'pointer',fontFamily:'inherit',
        }}>↺</button>
      </div>

      {/* Collapsible steps */}
      <StepAccordion steps={KASUYA_STEPS} curIdx={curIdx} phaseOf={phaseOf}/>
      <div style={{height:SP.md}}/>
    </div>
  );
}

function FourSixScreen(){
  const [screen,setScreen]=useState('ref');
  const [sel,setSel]=useState(null);
  if(screen==='brew'&&sel)
    return <FourSixBrew {...sel} onBack={()=>setScreen('ref')}/>;
  return <FourSixRef onSelect={(b,f,s,r)=>{setSel({beans:b,flavor:f,strength:s,recipe:r});setScreen('brew');}}/>;
}

function FourSixBrew({beans,flavor,strength,recipe,onBack}){
  const {steps,total,finish}=recipe;
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setElapsed(p=>{
          if(p>=finish){clearInterval(ref.current);setRunning(false);setDone(true);return finish;}
          return p+1;
        });
      },1000);
    } else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running,finish]);

  const curIdx=steps.reduce((a,s,i)=>elapsed>=s.seconds?i:a,-1);
  const nextStep=steps[curIdx+1];
  const timeToNext=nextStep?nextStep.seconds-elapsed:null;
  const poured=curIdx>=0?steps[curIdx].cumulative:0;
  const reset=()=>{clearInterval(ref.current);setElapsed(0);setRunning(false);setDone(false);};
  const urgent=timeToNext!==null&&timeToNext<=5;
  const flavorLabel=FLAVOR_OPT.find(f=>f.id===flavor)?.label;
  const strengthLabel=STRENGTH_OPT.find(s=>s.id===strength)?.label;
  const phaseOf=i=>steps[i]?.phase||'STRENGTH';
  const totalSteps=steps.length;
  const stepLabel=curIdx>=0?`STEP ${curIdx+1} / ${totalSteps}`:'READY';

  return (
    <div style={{padding:`${SP.md}px ${SP.md}px 0`,maxWidth:520,margin:'0 auto'}}>
      {/* Top */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:SP.xs}}>
        <div>
          <div style={{fontSize:11,color:C.dimmer,letterSpacing:'.15em'}}>{stepLabel}</div>
          <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap'}}>
            {[`豆${beans}g`,`湯${total}g`,flavorLabel,strengthLabel].map(t=>(
              <span key={t} style={{
                fontSize:9,padding:'2px 8px',borderRadius:20,
                background:C.goldBg,border:`1px solid ${C.goldDim}`,
                color:C.gold,
              }}>{t}</span>
            ))}
          </div>
        </div>
        <button onClick={onBack} style={{
          background:'none',border:`1px solid ${C.border}`,borderRadius:8,
          padding:'5px 12px',color:C.dimmer,fontSize:11,cursor:'pointer',fontFamily:'inherit',minHeight:32,
        }}>← 早見表</button>
      </div>

      {/* Time bar */}
      <TimeBar elapsed={elapsed} total={finish}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:C.dimmer,marginTop:3,marginBottom:SP.md}}>
        <span>0:00</span><span>{fmt(finish)}</span>
      </div>

      {/* ① Timer */}
      <TimerDisplay elapsed={elapsed} done={done}/>
      <div style={{textAlign:'center',fontSize:11,color:C.dimmer,marginTop:4,marginBottom:SP.sm}}>
        目安 {fmt(finish)} 完成
      </div>

      <div style={{height:1,background:C.border,marginBottom:SP.md}}/>

      {/* ② Next pour */}
      {timeToNext!==null&&running&&!done&&(
        <div style={{marginBottom:SP.md}}>
          <NextPourCard timeToNext={timeToNext} nextStep={nextStep}/>
        </div>
      )}

      {/* ③ Current step */}
      {curIdx>=0&&!done&&(
        <div style={{
          display:'inline-flex',alignItems:'center',gap:8,
          background:C.goldBg,border:`1px solid ${C.goldDim}`,
          borderRadius:20,padding:'4px 12px',marginBottom:SP.md,
        }}>
          <span style={{width:18,height:18,borderRadius:'50%',background:C.gold,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:C.bg,fontWeight:700}}>▶</span>
          <span style={{fontSize:11,color:C.gold}}>STEP {curIdx+1} · {steps[curIdx].time} · +{steps[curIdx].pour}g</span>
        </div>
      )}

      {/* ④ Pour progress */}
      <div style={{marginBottom:SP.md}}>
        <PourProgress poured={poured} total={total}/>
      </div>

      {done&&<DoneBanner message="完成！お楽しみください"/>}

      {/* Buttons */}
      <div style={{display:'flex',gap:SP.xs,marginBottom:SP.sm}}>
        <div style={{flex:1}}>
          <BrewButton
            label={running?'⏸  一時停止':'▶  スタート'}
            onClick={()=>setRunning(r=>!r)}
            variant={running?'pause':'start'}
            disabled={done}
          />
        </div>
        <button onClick={reset} style={{
          width:56,height:56,borderRadius:14,
          background:C.card,border:`1px solid ${C.border}`,
          color:C.dim,fontSize:14,cursor:'pointer',fontFamily:'inherit',
        }}>↺</button>
      </div>

      {/* Step accordion */}
      <StepAccordion steps={steps} curIdx={curIdx} phaseOf={phaseOf}/>
      <div style={{height:SP.md}}/>
    </div>
  );
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
function App(){
  const [mode,setMode]=useState('home');

  const TAB_ITEMS = [
    {id:'home',   label:'HOME',  Icon:IconHome},
    {id:'kasuya', label:'10投式', Icon:IconDripper},
    {id:'foursix',label:'4 / 6', Icon:IconFlask},
  ];

  return (
    <div style={{
      minHeight:'100vh',minHeight:'100dvh',
      background:`linear-gradient(160deg,#080d1a 0%,#0c1628 60%,#080d1a 100%)`,
      display:'flex',flexDirection:'column',
    }}>
      {/* Scrollable content */}
      <div className="scroll-area">
        {mode==='home'    && <HomeScreen onNav={setMode}/>}
        {mode==='kasuya'  && <KasuyaScreen/>}
        {mode==='foursix' && <FourSixScreen/>}
      </div>

      {/* Tab bar — Apple HIG style */}
      <nav className="tab-bar" role="tablist" aria-label="メインナビゲーション">
        {TAB_ITEMS.map(({id,label,Icon})=>{
          const active=mode===id;
          const color=active?C.gold:'#636366'; // system gray
          return (
            <button
              key={id}
              role="tab"
              aria-selected={active}
              aria-label={label}
              className="tab-item"
              onClick={()=>setMode(id)}
            >
              <Icon color={color} size={24}/>
              <span className="tab-label" style={{color,fontWeight:active?500:400}}>
                {label}
              </span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
