<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coffee Timer" />
  <meta name="theme-color" content="#080d1a" />
  <title>Coffee Timer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#080d1a;}
    body{
      font-family:-apple-system,'Hiragino Mincho ProN','Georgia',serif;
      color:#e8e0d0;
      overscroll-behavior:none;
      -webkit-tap-highlight-color:transparent;
    }
    #root{min-height:100vh;min-height:100dvh;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    @keyframes steam{
      0%{transform:translateY(0) scaleX(1);opacity:0.6;}
      50%{transform:translateY(-12px) scaleX(1.3);opacity:0.3;}
      100%{transform:translateY(-24px) scaleX(0.8);opacity:0;}
    }
    @keyframes ripple{
      0%{transform:scale(0.8);opacity:1;}
      100%{transform:scale(2.4);opacity:0;}
    }
    @keyframes slideUp{
      from{transform:translateY(20px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }
    .anim-slide{animation:slideUp 0.3s ease forwards;}
    .btn-press:active{transform:scale(0.97);transition:transform 0.1s;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════════════
// DESIGN TOKENS
// ═══════════════════════════════════════════════════════════
const T = {
  bg:       '#080d1a',
  bgCard:   'rgba(255,255,255,0.04)',
  bgCardHi: 'rgba(201,169,110,0.10)',
  border:   'rgba(255,255,255,0.08)',
  borderGold:'rgba(201,169,110,0.40)',
  gold:     '#c9a96e',
  goldHi:   '#e8c87a',
  goldDim:  'rgba(201,169,110,0.25)',
  blue:     '#3a9fc0',
  blueDim:  'rgba(58,159,192,0.20)',
  white:    '#f0e8d8',
  dim:      '#8ca5b8',
  dimmer:   '#4a6070',
  danger:   '#e87a5a',
};

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

// ═══════════════════════════════════════════════════════════
// RECIPE DATA
// ═══════════════════════════════════════════════════════════
const KASUYA_STEPS = [
  {id:1, time:'0:00',seconds:0,  pour:30,cumulative:30, note:'蒸らし'},
  {id:2, time:'0:30',seconds:30, pour:30,cumulative:60, note:'15秒間隔で注湯'},
  {id:3, time:'0:45',seconds:45, pour:30,cumulative:90, note:''},
  {id:4, time:'1:00',seconds:60, pour:30,cumulative:120,note:''},
  {id:5, time:'1:15',seconds:75, pour:30,cumulative:150,note:''},
  {id:6, time:'1:30',seconds:90, pour:30,cumulative:180,note:''},
  {id:7, time:'1:45',seconds:105,pour:30,cumulative:210,note:''},
  {id:8, time:'2:00',seconds:120,pour:30,cumulative:240,note:'お湯が抜けにくくなる'},
  {id:9, time:'2:15',seconds:135,pour:30,cumulative:270,note:''},
  {id:10,time:'2:30',seconds:150,pour:30,cumulative:300,note:'注ぎきる'},
];
const KASUYA_FINISH = 210;

const BEAN_OPTIONS = [12,18,24,30,36,42,48];
const FLAVOR_OPTIONS = [
  {id:'bright', label:'酸味・明るい', labelEn:'BRIGHT',  sub:'1st少なめ'},
  {id:'balance',label:'バランス',     labelEn:'BALANCE', sub:'均等'},
  {id:'sweet',  label:'甘み・クリア', labelEn:'SWEET',   sub:'1st多め'},
];
const STRENGTH_OPTIONS = [
  {id:'strong',label:'濃い', labelEn:'STRONG',sub:'2投'},
  {id:'medium',label:'普通', labelEn:'MEDIUM',sub:'3投'},
  {id:'light', label:'薄い', labelEn:'LIGHT', sub:'4投'},
];

function calcRecipe(beans,flavor,strength){
  const total=beans*15, f40=Math.round(total*0.4), s60=Math.round(total*0.6);
  const r = flavor==='sweet'?0.6:flavor==='bright'?0.4:0.5;
  const p1=Math.round(f40*r), p2=f40-p1;
  const n = strength==='strong'?2:strength==='light'?4:3;
  const pp = Math.round(s60/n);
  const steps=[
    {id:1,time:'0:00',seconds:0, pour:p1,cumulative:p1,      note:'蒸らし（甘み・酸味調整 前半）'},
    {id:2,time:'0:45',seconds:45,pour:p2,cumulative:p1+p2,   note:'甘み・酸味調整 後半'},
  ];
  let cum=p1+p2;
  for(let i=0;i<n;i++){
    const sec=90+i*45;
    const ap = i===n-1 ? total-cum : pp;
    cum+=ap;
    steps.push({
      id:3+i,
      time:`${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`,
      seconds:sec,pour:ap,cumulative:cum,
      note:i===0?'濃度調整 開始':'',
    });
  }
  return {total,steps,finish:steps[steps.length-1].seconds+90};
}

// ═══════════════════════════════════════════════════════════
// SHARED COMPONENTS
// ═══════════════════════════════════════════════════════════

// Large timer display
function TimerDisplay({elapsed, color}){
  return (
    <div style={{textAlign:'center',lineHeight:1}}>
      <div style={{
        fontSize:'clamp(80px,22vw,120px)',fontWeight:100,
        color:color||T.white,letterSpacing:'-0.02em',
        fontVariantNumeric:'tabular-nums',
        textShadow: color===T.gold ? `0 0 40px ${T.goldDim}` : 'none',
      }}>{fmt(elapsed)}</div>
    </div>
  );
}

// Next pour panel
function NextPourPanel({timeToNext, nextStep, urgent}){
  return (
    <div style={{
      background: urgent ? 'rgba(201,169,110,0.12)' : T.bgCard,
      border:`1px solid ${urgent ? T.borderGold : T.border}`,
      borderRadius:16,padding:'16px 20px',textAlign:'center',
      transition:'all 0.3s',
    }}>
      <div style={{fontSize:10,color:T.dimmer,letterSpacing:'0.2em',marginBottom:6,textTransform:'uppercase'}}>
        次の注湯まで
      </div>
      <div style={{
        fontSize:'clamp(52px,14vw,80px)',fontWeight:100,
        color: urgent ? T.goldHi : T.white,
        lineHeight:1,fontVariantNumeric:'tabular-nums',
      }}>
        {timeToNext}<span style={{fontSize:'clamp(22px,5vw,32px)',color:T.dim,marginLeft:4}}>秒</span>
      </div>
      <div style={{fontSize:12,color: urgent ? T.gold : T.dimmer,marginTop:6}}>
        {nextStep.time} &nbsp;·&nbsp; +{nextStep.pour}g &nbsp;·&nbsp; 累計 {nextStep.cumulative}g
      </div>
    </div>
  );
}

// Pour progress
function PourProgress({poured, total}){
  const pct = Math.round((poured/total)*100);
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
        <div style={{fontSize:10,color:T.dimmer,letterSpacing:'0.2em',textTransform:'uppercase'}}>注湯量（累計）</div>
        <div style={{fontSize:11,color:T.dimmer}}>{pct}%</div>
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:10}}>
        <span style={{fontSize:'clamp(44px,12vw,64px)',fontWeight:100,color:T.gold,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{poured}</span>
        <span style={{fontSize:'clamp(18px,4vw,24px)',color:T.dim}}>/ {total}g</span>
      </div>
      <div style={{height:6,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}}>
        <div style={{
          height:'100%',width:`${(poured/total)*100}%`,
          background:`linear-gradient(90deg,${T.blue},#5ab8d8)`,
          borderRadius:3,transition:'width 0.4s ease',
        }}/>
      </div>
    </div>
  );
}

// Step tracker row
function StepRow({step, status, phase}){
  // status: 'done' | 'active' | 'next' | 'pending'
  const icon = status==='done'?'✓':status==='active'?'▶':status==='next'?'◦':'○';
  const rowBg = status==='active' ? 'rgba(201,169,110,0.10)' : status==='next' ? 'rgba(255,255,255,0.03)' : 'transparent';
  const rowBorder = status==='active' ? `1px solid ${T.borderGold}` : `1px solid transparent`;
  const textColor = status==='done'?T.dimmer:status==='active'?T.gold:status==='next'?T.dim:T.dimmer;
  const iconColor = status==='done'?T.gold:status==='active'?T.gold:status==='next'?T.dim:T.dimmer;
  const phaseColor = phase==='FLAVOR' ? T.gold : T.blue;

  return (
    <div style={{
      display:'flex',alignItems:'center',gap:10,
      padding:'9px 12px',borderRadius:10,
      background:rowBg,border:rowBorder,
      opacity:status==='done'?0.45:1,transition:'all 0.3s',
    }}>
      <div style={{
        width:26,height:26,borderRadius:'50%',flexShrink:0,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:status==='done'?11:12,fontWeight:700,
        background: status==='active'?T.gold:status==='done'?'rgba(201,169,110,0.18)':'rgba(255,255,255,0.06)',
        color: status==='active'?'#080d1a':iconColor,
      }}>{icon}</div>

      <div style={{
        fontSize:8,padding:'2px 6px',borderRadius:3,flexShrink:0,
        background: phase==='FLAVOR'?'rgba(201,169,110,0.10)':'rgba(58,159,192,0.10)',
        color:phaseColor,letterSpacing:'0.05em',
      }}>{phase}</div>

      <div style={{width:36,fontSize:12,color:textColor,fontVariantNumeric:'tabular-nums',flexShrink:0}}>{step.time}</div>
      <div style={{width:32,fontSize:13,color:status==='active'?T.goldHi:T.dimmer,fontWeight:status==='active'?600:400,flexShrink:0}}>+{step.pour}g</div>
      <div style={{width:44,fontSize:12,color:status==='active'?T.white:T.dimmer,flexShrink:0,textAlign:'right'}}>{step.cumulative}g</div>
      {step.note&&status==='active'&&(
        <div style={{fontSize:10,color:T.gold,lineHeight:1.4,flex:1}}>{step.note}</div>
      )}
    </div>
  );
}

// Big action button
function BigButton({label, onClick, variant, disabled}){
  const bg = variant==='pause'
    ? 'rgba(255,255,255,0.07)'
    : `linear-gradient(135deg,${T.gold},#a07840)`;
  const border = variant==='pause' ? `1px solid rgba(255,255,255,0.15)` : 'none';
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className="btn-press"
      style={{
        width:'100%',height:72,borderRadius:16,
        border,background:disabled?'rgba(255,255,255,0.04)':bg,
        color:disabled?T.dimmer:T.white,
        fontSize:18,letterSpacing:'0.15em',
        cursor:disabled?'not-allowed':'pointer',
        fontFamily:'inherit',fontWeight:300,
        opacity:disabled?0.4:1,
        boxShadow: (!disabled&&variant!=='pause') ? `0 4px 20px rgba(201,169,110,0.25)` : 'none',
        transition:'all 0.2s',
      }}
    >{label}</button>
  );
}

// Time progress bar (thin gold)
function TimeBar({elapsed, total}){
  return (
    <div style={{height:2,background:'rgba(255,255,255,0.07)',borderRadius:1,overflow:'hidden'}}>
      <div style={{
        height:'100%',width:`${Math.min(elapsed/total,1)*100}%`,
        background:`linear-gradient(90deg,${T.gold},${T.goldHi})`,
        transition:'width 0.5s linear',
      }}/>
    </div>
  );
}

// Completion banner
function DoneBanner({message}){
  return (
    <div className="anim-slide" style={{
      background:'rgba(201,169,110,0.10)',
      border:`1px solid ${T.borderGold}`,
      borderRadius:14,padding:'14px 20px',textAlign:'center',
    }}>
      <div style={{fontSize:28,marginBottom:6}}>☕</div>
      <div style={{fontSize:14,color:T.gold,letterSpacing:'0.08em'}}>{message}</div>
    </div>
  );
}

// Collapsible step list
function StepList({steps, curIdx, phaseMap}){
  const [open,setOpen]=useState(false);
  return (
    <div style={{marginTop:8}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',
        background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,
        padding:'10px 14px',cursor:'pointer',fontFamily:'inherit',
      }}>
        <span style={{fontSize:11,color:T.dimmer,letterSpacing:'0.15em'}}>ステップ一覧</span>
        <span style={{fontSize:14,color:T.dimmer,transform:open?'rotate(180deg)':'none',transition:'transform 0.2s'}}>▾</span>
      </button>
      {open&&(
        <div className="anim-slide" style={{marginTop:6,display:'flex',flexDirection:'column',gap:3}}>
          {steps.map((step,i)=>{
            const status = i<curIdx?'done':i===curIdx?'active':i===curIdx+1?'next':'pending';
            return <StepRow key={step.id} step={step} status={status} phase={phaseMap(i)}/>;
          })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// KASUYA SCREEN  (Recipe view + Brew mode)
// ═══════════════════════════════════════════════════════════
function KasuyaScreen(){
  const [brewMode,setBrewMode]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setElapsed(p=>{
          if(p>=KASUYA_FINISH){clearInterval(ref.current);setRunning(false);setDone(true);return KASUYA_FINISH;}
          return p+1;
        });
      },1000);
    } else clearInterval(ref.current);
    return ()=>clearInterval(ref.current);
  },[running]);

  const curIdx=KASUYA_STEPS.reduce((a,s,i)=>elapsed>=s.seconds?i:a,-1);
  const nextStep=KASUYA_STEPS[curIdx+1];
  const timeToNext=nextStep?nextStep.seconds-elapsed:null;
  const poured=curIdx>=0?KASUYA_STEPS[curIdx].cumulative:0;
  const reset=()=>{clearInterval(ref.current);setElapsed(0);setRunning(false);setDone(false);};
  const startBrew=()=>{setBrewMode(true);};
  const endBrew=()=>{reset();setBrewMode(false);};

  const phaseMap=i=>i<2?'FLAVOR':'STRENGTH';

  // ── Recipe view ──
  if(!brewMode){
    return (
      <div style={{maxWidth:520,margin:'0 auto'}}>
        {/* Hero */}
        <div style={{
          background:'linear-gradient(160deg,rgba(201,169,110,0.08),rgba(10,20,40,0))',
          border:`1px solid ${T.goldDim}`,borderRadius:20,
          padding:'24px 20px',marginBottom:20,textAlign:'center',
        }}>
          <div style={{fontSize:10,color:T.gold,letterSpacing:'0.3em',textTransform:'uppercase',marginBottom:6}}>
            Barista Tetsu Kasuya — World Champion
          </div>
          <h2 style={{fontSize:'clamp(24px,7vw,40px)',fontWeight:200,color:T.white,letterSpacing:'0.03em',marginBottom:4}}>
            10投式の新レシピ
          </h2>
          <p style={{fontSize:12,color:T.dim,lineHeight:1.7}}>
            浅煎りの透明感とポテンシャルを最大限に引き出す
          </p>
        </div>

        {/* Spec grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
          {[
            ['豆の量','20g'],['湯量','300g (1:15)'],
            ['湯温','95〜96℃'],['挽き目','C40 / 40〜45クリック'],
            ['ドリッパー','HARIO V60 NEO'],['抽出時間','約3:30'],
          ].map(([l,v])=>(
            <div key={l} style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:'12px 14px'}}>
              <div style={{fontSize:10,color:T.dimmer,letterSpacing:'0.1em',marginBottom:3}}>{l}</div>
              <div style={{fontSize:14,color:T.gold,fontWeight:500}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Theory */}
        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,padding:'14px 16px',marginBottom:20}}>
          <div style={{fontSize:10,color:T.dimmer,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:10}}>抽出理論</div>
          <p style={{fontSize:12,color:T.dim,lineHeight:1.8}}>
            トータル300gのお湯を1回30gずつ・10回に分けて注ぎます。
            お湯をドリッパー内に溜めずに、スッと落とし切るイメージで。
            V60 Neoは少量ずつ均一にリブへ向かって抽出されるため、
            このレシピとの相性が特に抜群です。
          </p>
        </div>

        {/* Step preview */}
        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,padding:'14px 16px',marginBottom:24}}>
          <div style={{fontSize:10,color:T.dimmer,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:10}}>ステップ一覧</div>
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            {KASUYA_STEPS.map((step,i)=>(
              <StepRow key={step.id} step={step} status='pending' phase={phaseMap(i)}/>
            ))}
          </div>
        </div>

        {/* Start brew button */}
        <BigButton label="▶  抽出を開始する" onClick={startBrew}/>
        <div style={{textAlign:'center',marginTop:10,fontSize:11,color:T.dimmer}}>
          約3:30 &nbsp;·&nbsp; 10ステップ
        </div>
      </div>
    );
  }

  // ── Brew mode ──
  const urgent = timeToNext!==null && timeToNext<=5;
  const stepLabel = curIdx>=0 ? `STEP ${curIdx+1} / 10` : 'READY';

  return (
    <div style={{maxWidth:520,margin:'0 auto'}}>
      {/* Step indicator */}
      <div style={{
        display:'flex',justifyContent:'space-between',alignItems:'center',
        marginBottom:12,
      }}>
        <div style={{fontSize:11,color:T.dimmer,letterSpacing:'0.2em'}}>{stepLabel}</div>
        <button onClick={endBrew} style={{
          background:'none',border:`1px solid ${T.border}`,borderRadius:8,
          padding:'4px 12px',color:T.dimmer,fontSize:11,cursor:'pointer',fontFamily:'inherit',
        }}>レシピへ戻る</button>
      </div>

      {/* Time bar */}
      <TimeBar elapsed={elapsed} total={KASUYA_FINISH}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:T.dimmer,marginTop:3,marginBottom:16}}>
        <span>0:00</span><span>3:30</span>
      </div>

      {/* Timer — largest */}
      <div style={{textAlign:'center',marginBottom:4}}>
        <TimerDisplay elapsed={elapsed} color={done?T.gold:T.white}/>
        <div style={{fontSize:11,color:T.dimmer,marginTop:4,letterSpacing:'0.1em'}}>目安 3:30 完成</div>
      </div>

      <div style={{height:1,background:T.border,margin:'16px 0'}}/>

      {/* Next pour — second largest */}
      {timeToNext!==null && running && !done && (
        <div style={{marginBottom:14}}>
          <NextPourPanel timeToNext={timeToNext} nextStep={nextStep} urgent={urgent}/>
        </div>
      )}

      {/* Pour progress — third */}
      <div style={{marginBottom:16}}>
        <PourProgress poured={poured} total={300}/>
      </div>

      {/* Done */}
      {done&&<div style={{marginBottom:16}}><DoneBanner message="完成！浅煎りのクリアさ・甘さ・香りをお楽しみください"/></div>}

      {/* Buttons */}
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <div style={{flex:1}}>
          <BigButton
            label={running?'⏸  一時停止':'▶  スタート'}
            onClick={()=>setRunning(r=>!r)}
            variant={running?'pause':'start'}
            disabled={done}
          />
        </div>
        <button onClick={reset} style={{
          width:72,height:72,borderRadius:16,
          background:T.bgCard,border:`1px solid ${T.border}`,
          color:T.dim,fontSize:12,cursor:'pointer',fontFamily:'inherit',
        }}>リセット</button>
      </div>

      {/* Collapsible steps */}
      <StepList steps={KASUYA_STEPS} curIdx={curIdx} phaseMap={phaseMap}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 4/6 SCREEN
// ═══════════════════════════════════════════════════════════
function FourSixScreen(){
  const [screen,setScreen]=useState('ref'); // ref | brew
  const [sel,setSel]=useState(null);

  if(screen==='brew'&&sel){
    return <FourSixBrew {...sel} onBack={()=>setScreen('ref')}/>;
  }
  return <FourSixRef onSelect={(b,f,s,r)=>{setSel({beans:b,flavor:f,strength:s,recipe:r});setScreen('brew');}}/>;
}

function FourSixRef({onSelect}){
  const [flavor,setFlavor]=useState('balance');
  const [strength,setStrength]=useState('medium');
  const [hi,setHi]=useState(null);

  return (
    <div style={{maxWidth:600,margin:'0 auto'}}>
      {/* Header */}
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:10,color:T.gold,letterSpacing:'0.3em',textTransform:'uppercase',marginBottom:4}}>Tetsu Kasuya — V60 Neo</div>
        <h2 style={{fontSize:'clamp(22px,6vw,36px)',fontWeight:200,color:T.white,letterSpacing:'0.03em'}}>4/6メソッド</h2>
        <p style={{fontSize:11,color:T.dim,marginTop:4}}>Ratio 1:15 · 95〜96℃</p>
      </div>

      {/* Flavor selector */}

function FourSixBrew({beans,flavor,strength,recipe,onBack}){
  const {steps,total,finish}=recipe;
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setElapsed(p=>{
          if(p>=finish){clearInterval(ref.current);setRunning(false);setDone(true);return finish;}
          return p+1;
        });
      },1000);
    } else clearInterval(ref.current);
    return ()=>clearInterval(ref.current);
  },[running,finish]);

  const curIdx=steps.reduce((a,s,i)=>elapsed>=s.seconds?i:a,-1);
  const nextStep=steps[curIdx+1];
  const timeToNext=nextStep?nextStep.seconds-elapsed:null;
  const poured=curIdx>=0?steps[curIdx].cumulative:0;
  const reset=()=>{clearInterval(ref.current);setElapsed(0);setRunning(false);setDone(false);};
  const urgent=timeToNext!==null&&timeToNext<=5;
  const phaseMap=i=>i<2?'FLAVOR':'STRENGTH';
  const flavorLabel=FLAVOR_OPTIONS.find(f=>f.id===flavor)?.label;
  const strengthLabel=STRENGTH_OPTIONS.find(s=>s.id===strength)?.label;
  const totalSteps=steps.length;
  const stepLabel=curIdx>=0?`STEP ${curIdx+1} / ${totalSteps}`:'READY';

  return (
    <div style={{maxWidth:520,margin:'0 auto'}}>
      {/* Top bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div>
          <div style={{fontSize:11,color:T.dimmer,letterSpacing:'0.15em'}}>{stepLabel}</div>
          <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
            {[`豆${beans}g`,`湯${total}g`,flavorLabel,strengthLabel].map(t=>(
              <span key={t} style={{
                fontSize:9,padding:'2px 8px',borderRadius:20,
                background:'rgba(201,169,110,0.08)',border:`1px solid ${T.goldDim}`,
                color:T.gold,letterSpacing:'0.05em',
              }}>{t}</span>
            ))}
          </div>
        </div>
        <button onClick={onBack} style={{
          background:'none',border:`1px solid ${T.border}`,borderRadius:8,
          padding:'4px 12px',color:T.dimmer,fontSize:11,cursor:'pointer',fontFamily:'inherit',
        }}>← 早見表</button>
      </div>

      {/* Time bar */}
      <TimeBar elapsed={elapsed} total={finish}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:T.dimmer,marginTop:3,marginBottom:14}}>
        <span>0:00</span><span>{fmt(finish)}</span>
      </div>

      {/* Timer */}
      <div style={{textAlign:'center',marginBottom:4}}>
        <TimerDisplay elapsed={elapsed} color={done?T.gold:T.white}/>
        <div style={{fontSize:11,color:T.dimmer,marginTop:4}}>目安 {fmt(finish)} 完成</div>
      </div>

      <div style={{height:1,background:T.border,margin:'16px 0'}}/>

      {/* Next pour */}
      {timeToNext!==null&&running&&!done&&(
        <div style={{marginBottom:14}}>
          <NextPourPanel timeToNext={timeToNext} nextStep={nextStep} urgent={urgent}/>
        </div>
      )}

      {/* Pour progress */}
      <div style={{marginBottom:16}}>
        <PourProgress poured={poured} total={total}/>
      </div>

      {done&&<div style={{marginBottom:16}}><DoneBanner message="完成！お楽しみください"/></div>}

      {/* Buttons */}
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <div style={{flex:1}}>
          <BigButton
            label={running?'⏸  一時停止':'▶  スタート'}
            onClick={()=>setRunning(r=>!r)}
            variant={running?'pause':'start'}
            disabled={done}
          />
        </div>
        <button onClick={reset} style={{
          width:72,height:72,borderRadius:16,
          background:T.bgCard,border:`1px solid ${T.border}`,
          color:T.dim,fontSize:12,cursor:'pointer',fontFamily:'inherit',
        }}>リセット</button>
      </div>

      {/* Collapsible steps */}
      <StepList steps={steps} curIdx={curIdx} phaseMap={phaseMap}/>
    </div>
  );
}
